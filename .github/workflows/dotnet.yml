name: .NET CI + SonarQube + Deploy

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Set API key
        run: echo "TMDB__ApiKey=${{ secrets.TMDB_API_KEY }}" >> $GITHUB_ENV
        
      - name: Set DB connection
        run: echo "ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION }}" >> $GITHUB_ENV

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Add tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore dependencies
        run: dotnet restore

      - name: Begin SonarQube analysis
        run: |
          dotnet sonarscanner begin \
            /k:"MovieRater" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.exclusions="**/Migrations/**,movie-ui/src/app/app.ts"
            /d:sonar.cs.vstest.reportsPaths="**/*.trx" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: |
            dotnet test --no-build --configuration Release \
              --logger "trx;LogFileName=test_results.trx" \
              --collect:"XPlat Code Coverage" \
              -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Restore tools
        run: dotnet tool restore

      - name: End SonarQube analysis
        run: dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
        
      - name: Run mutation tests
        run: dotnet stryker

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/stinejennna/devops-exam:${{ github.ref_name }} \
            -t ghcr.io/stinejennna/devops-exam:latest \
            -f ./DevOpsExamMovie/Dockerfile \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/stinejennna/devops-exam:${{ github.ref_name }}
          docker push ghcr.io/stinejennna/devops-exam:latest

